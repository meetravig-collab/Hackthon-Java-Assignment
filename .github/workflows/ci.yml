name: CI - Build and Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest

    # PostgreSQL for the @QuarkusIntegrationTest (WarehouseEndpointIT), which launches the packaged
    # app in prod mode — its datasource points at localhost:15432 (see %prod in application.properties).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: quarkus_test
          POSTGRES_PASSWORD: quarkus_test
          POSTGRES_DB: quarkus_test
        ports:
          - 15432:5432
        options: >-
          --health-cmd "pg_isready -U quarkus_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Build, run tests + integration tests, with coverage
        run: ./mvnw clean verify -B

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: |
            target/surefire-reports/
            target/failsafe-reports/
          retention-days: 30
